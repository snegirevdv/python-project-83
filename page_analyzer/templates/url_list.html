{% extends "layouts/base.html" %}

{% block main %}
<main class="flex-grow-1">
  <div class="container-lg mt-3">
    <h1>Сайты</h1>    
      <div class="table-responsive">
        <table class="table table-bordered table-hover text-nowrap" data-test="urls">
          <thead>
          <tr>
            <th>ID</th>
            <th>Имя</th>
            <th>Последняя проверка</th>
            <th>Код ответа</th>
          </tr>
          </thead>
          <tbody>
            {% for url_info in url_list %}
            <tr>
              <td>{{ url_info.id }}</td>
              <td>
                <a href="{{ url_for('url_detail', id=url_info.id) }}">
                    {{ url_info.name }}
                </a>
              </td>
              
              <td>
                <!-- добавить последнюю проверку -->
              </td>
              <td>
                <!-- добавить код ответа -->
              </td>
            </tr>
            {% endfor %}
          </tbody>
        </table>
      </div>
    </div>
  </main>
{% endblock %}
